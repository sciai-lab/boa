defaults:
  - datamodule: qm9_vasp_small

dataset_name: qm9_vasp

basis_info: 
  _target_: boa.data.basis_info.BasisInfo.from_atomic_numbers_with_even_tempered_basis
  basis: 'def2-qzvppd'
  atomic_numbers: [1, 6, 7, 8, 9]
  beta: 2.0
  even_tempered: True
  uncontracted: True

datamodule:
  num_workers: 
    train: 16
    val: 16
    test: 16