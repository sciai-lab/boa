# Datamodule configuration optimized for SLURM
# Uses 16 workers to match the cpus_per_task setting

defaults:
  - qm9_vasp_small

# Match num_workers to cpus_per_task in SLURM (16 CPUs)
num_workers: 
  train: 16
  val: 16
  test: 16

# Keep batch sizes reasonable for single GPU
batch_size: 
  train: 12
  val: 12
  test: 12

# Use same probe settings as small dataset
n_probe:
  train: 5000