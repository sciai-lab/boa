# @package _global_

defaults:
  - override /trainer: slurm
  - override /hydra: submitit_slurm

trainer:
  limit_train_batches: 10
  limit_val_batches: 2

hydra:
  launcher:
    partition: gpu_a100_short
    time: "5:00"
    signal_delay_s: 150
    additional_parameters:
      signal: "SIGUSR1@150"
    # Submitit configuration
    timeout_min: 4320  # 72 hours in minutes
    slurm_max_num_timeout: 0
