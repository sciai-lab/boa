# @package hydra.launcher
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

# BaseConf
# Time Settings
timeout_min: 4320
# signal_delay_s: 180 seems to send USR2
# Node Settings
nodes: 1
tasks_per_node: 1
cpus_per_task: 16
gpus_per_node: 1
mem_gb: null
# job_name: ${name}

# SlurmConf
partition: gpu_h100
max_num_timeout: 0

# Job configuration
account: null
qos: null
exclude: null

# Python environment setup
setup:
  - "source ~/.bashrc"
  - "module purge"
  - "zstd --decompress -T0 /pfs/work9/workspace/scratch/hd_ai306-dft_data/data/qm9_vasp.tar.zst | tar --extract --file - -C $TMPDIR/"
  - "export BOA_DATA=$TMPDIR/hd_ai306-dft_data"
  - "export BOA_MODELS=/pfs/work9/workspace/scratch/hd_ai306-dft_data/models"
  - "cd ~/boa/"
  - "source .venv/bin/activate"
  - "export CUDA_VISIBLE_DEVICES=$SLURM_LOCALID"

additional_parameters:
  signal: "SIGUSR1@180"
  open-mode: "append"
  export: "ALL"

submitit_folder: "${hydra.sweep.dir}/%j_${name}"
